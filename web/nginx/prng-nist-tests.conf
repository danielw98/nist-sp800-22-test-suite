# nginx vhost for prng-nist-tests.student-dev.ro (VPS-B / studlab stack, shared studlab-nginx).
# Renamed from rngtests.student-dev.ro, which is kept as a 301 redirect (last block).
# Deploy to ~admin/data/studlab/nginx/conf.d/prng-nist-tests.conf, then reload studlab-nginx.
# One-time cert (HTTP-01 webroot; challenge served by _default.conf on :80):
#   docker exec studlab-certbot certbot certonly --webroot -w /var/www/certbot -d prng-nist-tests.student-dev.ro
#
# Studlab house style: `http2 on;` + resolver + variable upstream, so a reload
# never fails when rngtests-web is briefly down. The internal container keeps its
# name rngtests-web (only the public hostname was renamed).

server {
    listen 80;
    server_name prng-nist-tests.student-dev.ro;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name prng-nist-tests.student-dev.ro;

    ssl_certificate     /etc/letsencrypt/live/prng-nist-tests.student-dev.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prng-nist-tests.student-dev.ro/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;

    # /api/run accepts up to 8,000,000 bits (~8 MB of '0'/'1'); allow headroom
    # for the JSON envelope and any whitespace in the payload.
    client_max_body_size 16M;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream http://rngtests-web:3000;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /_next/static/ {
        proxy_pass $upstream;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass $upstream;
        proxy_read_timeout 120;
    }
}

# Old hostname -> 301 redirect to the new canonical host (keeps any existing
# links working). http://rngtests... is upgraded to https by _default.conf first.
server {
    listen 443 ssl;
    http2 on;
    server_name rngtests.student-dev.ro;

    ssl_certificate     /etc/letsencrypt/live/rngtests.student-dev.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rngtests.student-dev.ro/privkey.pem;

    return 301 https://prng-nist-tests.student-dev.ro$request_uri;
}
